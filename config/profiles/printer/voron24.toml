# Voron 2.4 (Klipper, CoreXY, direct drive).
# Assumes a PRINT_START / PRINT_END macro in your printer.cfg that handles
# homing, QGL, bed mesh, nozzle purge and (for PRINT_END) cooldown + park.
inherits = "generic"

# 350mm build (the 2.4 also ships as 250/300 — override with --bed-x/--bed-y).
bed_size_x_mm = 350.0
bed_size_y_mm = 350.0
bed_size_z_mm = 340.0

# Motion limits. Interior features (inner walls, infill, solid, travel) run at
# `acceleration`; the visible outer wall is pinned to a gentle 3000 so ringing
# never reaches the surface, and the first layer auto-derives to 1000 for
# adhesion. Klipper additionally clamps every M204 to printer.cfg max_accel —
# if your config still has the stock 3000, raise it (or lower this) so the
# two agree.
acceleration = 10000.0
outer_wall_accel = 3000.0
jerk = 10.0
travel_speed_mm_s = 350.0
print_speed_mm_s = 150.0
first_layer_speed_mm_s = 30.0

# Direct-drive extruder: short, fast retraction.
retract_len_mm = 0.5
retract_speed_mm_s = 40.0

# Printer connection (Moonraker): uncomment to enable Send / Send & print.
# host_url = "voron24.local"
# api_key = ""

start_gcode = """
PRINT_START EXTRUDER={nozzle_temp} BED={bed_temp}
"""

end_gcode = """
PRINT_END
"""
