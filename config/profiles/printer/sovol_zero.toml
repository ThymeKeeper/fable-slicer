# Sovol Zero (Klipper, CoreXY, high-speed). Build volume 152.4 x 152.4 x 152.5 mm.
inherits = "generic"

bed_size_x_mm = 152.4
bed_size_y_mm = 152.4
bed_size_z_mm = 152.5

# High-speed CoreXY: rated 1200 mm/s / 40000 mm/s², ~50 mm³/s flow hotend.
# Speeds matched to OrcaSlicer's high-speed profile (measured from its
# g-code): inner walls 400 mm/s (Orca asks 500 for sparse but the volumetric
# cap clamps both the same), first layer 55, travel 1000, square-corner
# velocity 5. Basic pla (21 mm³/s, = Orca's generic PLA) is the like-for-like
# pairing; the stock hotend is high-flow, so pla-hf (30) is the machine's
# real ceiling — the melt cap is what actually limits speed here.
# (Our external-wall auto stays at 50% of print speed — quality-first — where
# Orca asks 350; pin "external mm/s" in the GUI for Orca's number.)
#
# Acceleration runs well under the 40000 rating: full rate hammers the frame
# on every infill turnaround and travel whip, for ~7% of a Benchy's time
# (40000/10000 → 15000/6000 measured 30m51s → 33m01s). The outer-wall accel
# also paces the top/bottom skins, landing near Orca's 5000 top-surface
# value. First layer still auto-derives to 1000.
acceleration = 15000.0
outer_wall_accel = 6000.0
jerk = 5.0
travel_speed_mm_s = 1000.0
print_speed_mm_s = 400.0
first_layer_speed_mm_s = 55.0

retract_len_mm = 0.5
retract_speed_mm_s = 40.0

# Beyond the toolhead part fan: an auxiliary side fan and a chamber exhaust,
# driven Orca/Bambu-style as M106 P2 / M106 P3 (Sovol's Klipper maps them).
# Duties live in the filament tier (aux_fan_speed / exhaust_fan_speed).
aux_fan = true
exhaust_fan = true

# Chamber thermistor, by its Klipper temperature_sensor name (verified live
# against the machine's Moonraker object list). Filaments that want a warm
# chamber (ABS/ASA) gate the print on a pre-soak after the start g-code.
chamber_sensor = "chamber_temp"

# Printer connection (Moonraker): uncomment to enable Send / Send & print.
# host_url = "sovol-zero.local"
# api_key = ""

# Stock firmware defines bare START_PRINT / END_PRINT macros that take no
# parameters and do no heating — heat explicitly around them, mirroring Sovol's
# own Orca profile: bed → home → START_PRINT → home → park front-left → nozzle.
# Nozzle heats only after homing/probing so it doesn't ooze onto the bed mesh.
# The double G28 is vendor-shipped; keep the known-good sequence verbatim.
start_gcode = """
M140 S{bed_temp}
M190 S{bed_temp}
G28
START_PRINT
G28
G90
G1 X0 Y0 F12000
G1 Z0.300 F600
M104 S{first_layer_nozzle_temp}
M109 S{first_layer_nozzle_temp}
"""

end_gcode = """
END_PRINT
"""
