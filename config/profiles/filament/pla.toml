# Generic PLA, as a packaging card: the temperature and bed below are what a
# typical PLA box says (matched to the Orca pairing used on the Sovol Zero —
# 210 °C operating, +20 first-layer bump = 230). Calibration entries
# carry the measured numbers; everything else follows the material class.
material = "pla"
filament_diameter_mm = 1.75
nozzle_temp_c = 210
bed_temp_c = 65

# --- calibration (measured on the Zero's stock hotend / Orca-matched) ---
pressure_advance = 0.032
max_volumetric_speed_mm3_s = 21.0
aux_fan_speed = 0.75
exhaust_fan_speed = 0.8
